# Nginx server block for namastemandarin.com
# Install to: /etc/nginx/sites-available/namastemandarin.com
# Then symlink to sites-enabled and reload nginx.
# Certbot will automatically add the HTTPS (443) block + HTTP->HTTPS redirect.

server {
    listen 80;
    listen [::]:80;
    server_name namastemandarin.com www.namastemandarin.com;

    root /var/www/namastemandarin;
    index index.html;

    # gzip compression
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Long-cache fingerprinted build assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA routing: serve index.html for any unknown path
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Basic security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
