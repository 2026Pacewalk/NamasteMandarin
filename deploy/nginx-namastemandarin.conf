# Nginx server block for namastemandarin.com
# Install to: /etc/nginx/sites-available/namastemandarin.com
# Then symlink to sites-enabled and reload nginx.
# Certbot will automatically add the HTTPS (443) block + HTTP->HTTPS redirect.

server {
    listen 80;
    listen [::]:80;
    server_name namastemandarin.com www.namastemandarin.com;

    root /var/www/namastemandarin;
    index index.html;

    # gzip compression
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Long-cache fingerprinted build assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # CMS API → Node backend
    location /api/ {
        proxy_pass http://127.0.0.1:4010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10M;
    }

    # Admin-uploaded images → Node backend
    location /uploads/ {
        proxy_pass http://127.0.0.1:4010;
        expires 30d;
        add_header Cache-Control "public";
    }

    # SPA routing: serve index.html for any unknown path
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Basic security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
